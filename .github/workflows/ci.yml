name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check mesh/ sdk/ agents/ tests/ demo.py

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run mypy
        run: mypy mesh/ sdk/ agents/ --ignore-missing-imports --no-strict-optional

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          LOG_LEVEL: WARNING
        run: pytest tests/ -v --cov=mesh --cov=sdk --cov-report=term-missing --ignore=tests/test_e2e.py

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: success()
        with:
          fail_ci_if_error: false

  dashboard-build:
    name: Dashboard build (TypeScript)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package.json

      - name: Install npm dependencies
        run: npm install

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build dashboard
        run: npm run build
